name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[all,dev]"
      - name: Ruff
        run: ruff check .
      - name: Ruff format (check)
        run: ruff format --check .
      - name: Mypy
        run: mypy steeper

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[all,test]"
      - name: Pytest
        run: pytest -q

  import-extras:
    name: Import smoke (${{ matrix.extra }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extra: [aiogram, telebot, ptb]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install single extra
        run: pip install -e ".[${{ matrix.extra }}]"
      - name: Import integration
        run: python -c "import importlib; importlib.import_module(f'steeper.integrations.${{ matrix.extra }}'); print('ok')"
